name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tank-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tank-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libssl-dev \
            pkg-config \
            clang \
            libclang-dev

      # whisper-rs needs libclang on Windows too; provided by the MSVC runner
      # via the pre-installed LLVM. Point LIBCLANG_PATH explicitly.
      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvm = (Get-ChildItem "C:\Program Files\LLVM\bin" -ErrorAction SilentlyContinue) |
                  Select-Object -First 1
          if ($llvm) {
            "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -Append $env:GITHUB_ENV
          }

      - name: Build
        run: cargo build --release --bin tank --target ${{ matrix.target }}

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: cp target/${{ matrix.target }}/release/tank ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target\${{ matrix.target }}\release\tank.exe" "${{ matrix.artifact }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tank-linux-x86_64
            tank-windows-x86_64.exe
